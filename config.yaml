# 期货CTA策略配置
# ============================

# 数据源配置
data:
  source: "akshare"
  start_date: "20200101"
  output_dir: "./data/futures"

# ==================== 交易品种 ====================
# 基于基本面筛选的品种及策略方向
positions:
  LH0:
    name: "生猪"
    exchange: "dce"
    direction: "long"       # 做多
    multiplier: 16           # 合约乘数: 16吨/手
    pricetick: 5             # 最小变动: 5元/吨
    margin_rate: 0.08
    commission: 2.0          # 手续费: 2元/手
    reason: "基本面超跌, 库存仍超出需求, 判断处于低位, 等待入场做多时机"

  PS0:
    name: "多晶硅"
    exchange: "gfex"
    direction: "short"      # 做空
    multiplier: 3            # 合约乘数: 3吨/手
    pricetick: 5             # 最小变动: 5元/吨
    margin_rate: 0.12
    commission: 3.0          # 手续费: 3元/手
    reason: "库存过多, 需求无明显增长, 做空"

# ==================== 盘前分析参数 ====================
pre_market:
  # 均线系统
  ma_windows: [5, 10, 20, 60, 120]

  # 支撑阻力
  sr_lookback: 120          # 支撑阻力回看天数
  sr_touch_count: 3         # 至少触及次数

  # 趋势判断
  atr_window: 14
  rsi_window: 14
  macd:
    fast: 12
    slow: 26
    signal: 9
  bollinger:
    window: 20
    std: 2

  # 目标价位
  fib_levels: [0.236, 0.382, 0.5, 0.618, 0.786]

# 基本面筛选门槛与分类
fundamental_screening:
  default_threshold: 10
  categories:
    high_sensitivity:  # 高敏感度 (微小变化即信号)
      threshold: 3
      symbols: ["LH0"]
    agricultural:      # 农产品
      threshold: 8
      symbols: ["A0", "M0", "RM0", "C0", "CS0", "CF0", "SR0"]
    low_sensitivity:   # 低敏感度/高波动 (需极端数据)
      threshold: 15
      symbols: ["AU0", "AG0", "LC0", "SI0"]

# ==================== 日内策略参数 ====================
intraday:
  # 突破策略
  breakout:
    window: 20              # N日高低点突破
    atr_stop_multiplier: 2  # ATR止损倍数

  # 均值回归策略
  mean_reversion:
    bb_window: 20           # 布林带窗口
    bb_std: 2               # 布林带标准差
    rsi_oversold: 30        # RSI超卖
    rsi_overbought: 70      # RSI超买

  # 信号过滤
  volume_filter: 1.5        # 成交量需大于均量的倍数

  # 风控
  max_loss_pct: 0.02        # 单笔最大亏损 2%
  daily_max_loss_pct: 0.05  # 当日最大亏损 5%
  max_trades_per_day: 5     # 当日最大交易次数
